<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Firebase ID Detection and Top-Up System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body class="bg-light">
    <!-- Navigation Bar -->
    <nav class="navbar navbar-expand-lg navbar-light bg-light">
        <div class="container-fluid">
            <a class="navbar-brand" href="index.html">GreenPath Select</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav"
                aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav">
                    <li class="nav-item">
                        <a class="nav-link" id="nav-home" href="index.html">Home</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" id="nav-products" href="products.html">Products</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link active" id="nav-redeem" aria-current="page" href="topup.html">Redeem</a>
                    </li>
                </ul>
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item dropdown">
                        <a class="nav-link dropdown-toggle" href="#" id="languageDropdown" role="button"
                            data-bs-toggle="dropdown" aria-expanded="false">
                            Language
                        </a>
                        <ul class="dropdown-menu dropdown-menu-end" aria-labelledby="languageDropdown">
                            <li><a class="dropdown-item" href="topup.html">Chinese</a></li>
                            <li><a class="dropdown-item" href="topup-en.html">English</a></li>
                        </ul>
                    </li>
                </ul>
            </div>
        </div>
    </nav>
    <div class="container py-5">
        <h1 class="text-center mb-4">Amusement Park Entry and Top-Up System</h1>

        <div class="mb-3">
            <label for="idInput" class="form-label">Enter ID (RFID Scan Supported):</label>
            <input type="text" id="idInput" class="form-control" placeholder="Submit after entering" />
        </div>

        <div class="mb-3">
            <label for="productCodeInput" class="form-label">Enter Product Code:</label>
            <input type="text" id="productCodeInput" class="form-control"
                placeholder="Check product for price autofill" />
        </div>
        <button id="checkProductButton" class="btn btn-primary flex-grow-1">Check Product</button>
        <!-- modal -->
        <div class="modal fade" id="productModal" tabindex="-1" aria-labelledby="productModalLabel" aria-hidden="true">
            <div class="modal-dialog">
                <div class="modal-content">
                    <div class="modal-header">
                        <h5 class="modal-title" id="productModalLabel">Product Confirmation</h5>
                        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                    </div>
                    <div class="modal-body">
                        <p id="productInfo">Product Name: <span id="modalProductName"></span></p>
                        <p>Product Price: <span id="modalProductPrice"></span> TWD</p>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                        <button type="button" class="btn btn-primary" id="confirmProductButton">Confirm</button>
                    </div>
                </div>
            </div>
        </div>

        <div class="mb-3">
            <label for="amountInput" class="form-label">Amount:</label>
            <input type="number" id="amountInput" class="form-control"
                placeholder="Enter amount (positive or negative)" />
        </div>

        <div class="mb-3 d-flex gap-2">
            <button id="submitButton" class="btn btn-success flex-grow-1">Submit</button>
            <button id="checkBalanceButton" class="btn btn-info flex-grow-1">Check Current Balance</button>
            <button id="viewTransactionsButton" class="btn btn-warning flex-grow-1">View Transactions & Chart</button>
        </div>

        <!-- Results Display Area -->
        <div id="result" class="alert alert-info d-none"></div>

        <!-- Transaction Records Display Area -->
        <div id="transactionRecords" class="mt-4">
            <h3>Today's Transactions:</h3>
            <ul class="list-group" id="transactionList"></ul>
        </div>

        <!-- Consumption Amount Line Chart -->
        <div id="chartContainer" class="mt-4">
            <h3>Consumption Trend Chart:</h3>
            <canvas id="transactionChart"></canvas>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.1.0/firebase-app.js";
        import { getDatabase, ref, get, set, push, update } from "https://www.gstatic.com/firebasejs/11.1.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyA5NaL2Zv-DFGv4jm11dl17dSvbAubcTlY",
            authDomain: "webprogramming-feb0c.firebaseapp.com",
            databaseURL: "https://webprogramming-feb0c-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "webprogramming-feb0c",
            storageBucket: "webprogramming-feb0c.firebasestorage.app",
            messagingSenderId: "387978887434",
            appId: "1:387978887434:web:8be3c89fed08f37b30faf3"
        };


        //初始化firebase
        const app = initializeApp(firebaseConfig);
        const database = getDatabase(app);

        //商品代號對照
        const productDatabaseRef = ref(database, 'products');

        document.getElementById('checkProductButton').addEventListener('click', async () => {
            const productCode = document.getElementById('productCodeInput').value.trim();

            if (!productCode) {
                Swal.fire({
                    icon: 'error',
                    title: 'Error',
                    text: 'Please enter a product code!',
                });
                return;
            }

            const productRef = ref(database, `products/${productCode}`);
            const productSnapshot = await get(productRef);

            if (!productSnapshot.exists()) {
                Swal.fire({
                    icon: 'error',
                    title: 'Error',
                    text: `Product code not found: ${productCode}`,
                });
                return;
            }

            const productData = productSnapshot.val();
            document.getElementById('modalProductName').textContent = Object.keys(productData)[0];
            document.getElementById('modalProductPrice').textContent = Object.values(productData)[0];
            const productModal = new bootstrap.Modal(document.getElementById('productModal'));
            productModal.show();
        });

        // Auto-fill price into the amount field
        document.getElementById('confirmProductButton').addEventListener('click', () => {
            const price = document.getElementById('modalProductPrice').textContent;
            document.getElementById('amountInput').value = `-${price}`; // Add a negative sign to the amount
            const productModal = bootstrap.Modal.getInstance(document.getElementById('productModal'));
            productModal.hide();
        });

        // 引入 Chart.js 的程式碼
        const chartCtx = document.getElementById('transactionChart').getContext('2d');
        let transactionChart;

        // 渲染消費金額的折線圖
        function renderTransactions(transactions) {
            const transactionList = document.querySelector('#transactionRecords .list-group');
            if (!transactionList) {
                console.error('The transaction record area was not loaded. Please check if the HTML structure is correct.');
                return;
            }
            transactionList.innerHTML = '';
            transactions.forEach(transaction => {
                const listItem = document.createElement('li');
                listItem.className = 'list-group-item';
                const localTime = formatToLocalTime(transaction.timestamp);
                listItem.textContent = `Amount: ${transaction.amount} TWD, Time: ${localTime}`;
                transactionList.appendChild(listItem);
            });
        }

        function renderTransactionChart(transactions) {
            const labels = transactions.map(t => formatToLocalTime(t.timestamp));
            const data = transactions.map(t => t.amount);

            if (transactionChart) {
                transactionChart.data.labels = labels;
                transactionChart.data.datasets[0].data = data;
                transactionChart.update();
            } else {
                transactionChart = new Chart(chartCtx, {
                    type: 'line',
                    data: {
                        labels: labels,
                        datasets: [{
                            label: 'Expenditure (Yuan)',
                            data: data,
                            borderColor: 'rgba(75, 192, 192, 1)',
                            backgroundColor: 'rgba(75, 192, 192, 0.2)',
                            borderWidth: 2,
                        }]
                    },
                    options: {
                        responsive: true,
                        scales: {
                            x: { title: { display: true, text: 'Time' } },
                            y: { title: { display: true, text: 'Amount (Yuan)' }, beginAtZero: true }
                        }
                    }
                });
            }
        }

        // 在獲取交易資料後更新圖表
        async function renderTransactionsAndChart(transactions) {
            renderTransactions(transactions);
            renderTransactionChart(transactions);
        }

        // 在頁面載入時加載交易紀錄
        window.addEventListener('load', async () => {
            const id = document.getElementById('idInput').value.trim();
            if (id) {
                await fetchTodayTransactions(id);
            }
        });

        // 更新 fetchTodayTransactions 確保即使無交易仍渲染圖表
        async function fetchTodayTransactions(id) {
            if (!id) {
                updateTransactionList('Please enter a valid ID.');
                renderTransactionChart([]); // 清空圖表
                return;
            }

            const userRef = ref(database, `users/${id}`);
            const userSnapshot = await get(userRef);

            if (!userSnapshot.exists()) {
                updateTransactionList('User data not found.');
                renderTransactionChart([]); // 清空圖表
                return;
            }

            const userData = userSnapshot.val();
            const today = new Date();
            const startOfDay = new Date(today.getFullYear(), today.getMonth(), today.getDate()).getTime();
            const endOfDay = new Date(today.getFullYear(), today.getMonth(), today.getDate(), 23, 59, 59).getTime();

            const transactionsRef = ref(database, `users/${id}/transactions`);
            const snapshot = await get(transactionsRef);

            let transactions = [];
            if (snapshot.exists()) {
                transactions = Object.values(snapshot.val()).filter(transaction => {
                    const timestamp = transaction.timestamp ? new Date(transaction.timestamp).getTime() : null;
                    return timestamp && timestamp >= startOfDay && timestamp <= endOfDay;
                });
            }

            if (transactions.length > 0) {
                renderTransactionsAndChart(transactions);
            } else {
                updateTransactionList('Today is transaction records are empty.');
                renderTransactionChart([]); // 確保圖表清空或顯示空值
            }
        }

        //抓取時區
        function formatToLocalTime(utcTime) {
            const localTime = new Date(utcTime);
            return localTime.toLocaleString('zh-TW', { timeZone: 'Asia/Taipei' });
        }

        //交易紀錄
        function updateTransactionList(message = '') {
            const transactionList = document.querySelector('#transactionRecords .list-group');
            if (!transactionList) {
                console.error('The transaction record area was not loaded. Please check if the HTML structure is correct.');
                return;
            }
            transactionList.innerHTML = message
                ? `<li class="list-group-item">${message}</li>`
                : '';
        }

        async function getUserStatus(id) {
            const userRef = ref(database, `users/${id}`);
            const userSnapshot = await get(userRef);

            if (!userSnapshot.exists()) {
                console.error(`User ID not found: ${id}`);
                return null;
            }

            const userData = userSnapshot.val();
            return userData.inOutStatus?.status || 'out';
        }

        //語音播報
        function speakText(message) {
            const synth = window.speechSynthesis;
            const utterance = new SpeechSynthesisUtterance(message);
            utterance.lang = 'en-US'; // 設定語言為美式英語
            synth.speak(utterance);
        }

        // 新增用戶檢查與交易處理邏輯
        async function handleNewUser(id) {
            const dbRef = ref(database, `users/${id}`);
            const currentTime = new Date().toISOString();

            const newUser = {
                balance: 0,
                inOutStatus: {
                    status: 'out',
                    timestamp: currentTime,
                },
                transactions: {},
                timestamp: currentTime,
            };

            await set(dbRef, newUser);

            Swal.fire({
                icon: 'success',
                title: 'Welcome, New User!',
                text: `A new user profile has been created for ID: ${id}`,
            });

            speakText(`Welcome, new user! A profile has been created for ID: ${id}.`);
        }

        async function handleTransaction(id, amount) {
            const dbRef = ref(database, `users/${id}`);
            const snapshot = await get(dbRef);

            if (!snapshot.exists()) {
                await handleNewUser(id); // 處理新用戶
                return;
            }

            const userData = snapshot.val();
            const currentTime = new Date().toISOString();

            if (!isNaN(amount)) {
                const newBalance = (userData.balance || 0) + amount;

                if (newBalance < 0) {
                    Swal.fire({
                        icon: 'error',
                        title: 'Transaction Failed',
                        text: `Insufficient balance. Current balance: ${userData.balance || 0} TWD`,
                    });
                    speakText(`Transaction failed. Insufficient balance. Current balance: ${userData.balance || 0} TWD.`);
                    return;
                }

                const transactionsRef = ref(database, `users/${id}/transactions`);
                const newTransactionRef = push(transactionsRef);
                await set(newTransactionRef, {
                    amount,
                    timestamp: currentTime,
                });

                await update(dbRef, {
                    balance: newBalance,
                    timestamp: currentTime,
                });

                Swal.fire({
                    icon: 'success',
                    title: 'Transaction Successful',
                    text: `New balance: ${newBalance} TWD, Time: ${formatToLocalTime(currentTime)}`,
                });
                speakText(`Transaction successful. New balance: ${newBalance} TWD.`);

                fetchTodayTransactions(id);
            } else {
                const currentStatus = userData.inOutStatus?.status || 'out';
                const newStatus = currentStatus === 'in' ? 'out' : 'in';

                await update(dbRef, {
                    inOutStatus: {
                        status: newStatus,
                        timestamp: currentTime,
                    },
                    timestamp: currentTime,
                });

                Swal.fire({
                    icon: 'info',
                    title: 'Status Updated',
                    text: `ID is now ${newStatus === 'in' ? 'entered' : 'exited'}, Time: ${formatToLocalTime(currentTime)}`,
                });
                speakText(`Status updated. ID is now ${newStatus === 'in' ? 'entered' : 'exited'}.`);

                if (newStatus === 'out') {
                    clearTransactionRecordsAndChart();
                }
            }
        }

        function clearTransactionRecordsAndChart() {
            // 清除交易記錄
            const transactionList = document.getElementById('transactionList');
            transactionList.innerHTML = '';

            // 清除圖表內容
            const chartContainer = document.getElementById('chartContainer');
            chartContainer.innerHTML = '<canvas id="transactionChart"></canvas>';
            console.log('交易記錄與圖表已清除');
        }

        async function checkBalance(id) {
            const dbRef = ref(database, `users/${id}`);
            const snapshot = await get(dbRef);

            if (snapshot.exists()) {
                const userData = snapshot.val();
                Swal.fire({
                    icon: 'info',
                    title: 'Balance Inquiry',
                    text: `Current balance: ${userData.balance || 0} TWD`,
                });
                fetchTodayTransactions(id);
            } else {
                Swal.fire({
                    icon: 'error',
                    title: 'Error',
                    text: 'ID does not exist, unable to check balance.',
                });
            }
        }

        document.getElementById('submitButton').addEventListener('click', async () => {
            const id = document.getElementById('idInput').value.trim();
            const amount = parseFloat(document.getElementById('amountInput').value.trim());

            if (!id) {
                Swal.fire({
                    icon: 'error',
                    title: 'Error',
                    text: 'Please enter an ID!',
                });
                return;
            }
            await handleTransaction(id, amount);
        });

        document.getElementById('checkBalanceButton').addEventListener('click', async () => {
            const id = document.getElementById('idInput').value.trim();
            if (!id) {
                Swal.fire({
                    icon: 'error',
                    title: 'Error',
                    text: 'Please enter an ID!',
                });
                return;
            }
            await checkBalance(id);
        });

        //查看交易紀錄與圖表按鈕邏輯
        document.getElementById('viewTransactionsButton').addEventListener('click', async () => {
            const id = document.getElementById('idInput').value.trim();
            if (!id) {
                Swal.fire({
                    icon: 'error',
                    title: '錯誤',
                    text: '請輸入 ID!',
                });
                return;
            }
            await fetchTodayTransactions(id);
        });


        // RFID input logic
        document.addEventListener('keydown', function (event) {
            if (event.key === 'Enter') {
                const scannedValue = event.target.value.trim();

                if (document.activeElement.id === 'idInput') {
                    Swal.fire({
                        icon: 'success',
                        title: 'RFID Scan Successful',
                        text: `ID has been set to: ${scannedValue}`,
                    });
                } else if (document.activeElement.id === 'productCodeInput') {
                    Swal.fire({
                        icon: 'success',
                        title: 'RFID Scan Successful',
                        text: `Product code has been set to: ${scannedValue}`,
                    });
                }

                event.target.value = '';
            }
        });

    </script>
</body>

</html>
